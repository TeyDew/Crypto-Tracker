<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crypto Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app" id="app">

    <!-- Header -->
    <div class="header">
      <div class="brand">
        <span class="brand-dot" id="brandDot"></span>
        Crypto Tracker
      </div>
      <div class="header-right">
        <button class="refresh-btn" id="refreshBtn" title="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M3 12a9 9 0 0 1 15.36-6.36L21 8"/>
            <path d="M21 3v5h-5"/>
            <path d="M21 12a9 9 0 0 1-15.36 6.36L3 16"/>
            <path d="M3 21v-5h5"/>
          </svg>
        </button>
        <div class="currency-toggle">
          <button class="cur-btn active" data-cur="usd">USD</button>
          <button class="cur-btn" data-cur="eur">EUR</button>
        </div>
      </div>
    </div>

    <!-- Triggered Alerts Banner -->
    <div class="trig-banner" id="trigBanner">
      <div class="trig-banner-header">
        <svg class="trig-bell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span id="trigBannerTitle">Alert triggered</span>
      </div>
      <div class="trig-list" id="trigList"></div>
    </div>

    <!-- Primary crypto -->
    <div class="hero-card">
      <div class="crypto-select" id="cryptoSelect">
        <div class="coin-icon" id="heroIcon"></div>
        <div class="coin-meta">
          <span class="coin-name" id="heroName">Bitcoin</span>
          <span class="coin-symbol" id="heroSymbol">BTC</span>
        </div>
      </div>

      <div class="price-row">
        <div class="price-big" id="heroPrice">—</div>
        <div class="badge-change" id="heroBadge">
          <span id="heroChange">—</span>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-section">
      <div class="chart-label">
        <span class="section-label">24h Change</span>
      </div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
        <canvas id="chartHover"></canvas>
        <div class="chart-loader" id="chartLoader">
          <div class="spinner" id="chartSpinner"></div>
          <div class="chart-loader-msg" id="chartMsg"></div>
          <button class="chart-retry-btn" id="chartRetry">↺ Retry</button>
        </div>
        <div class="chart-tooltip" id="chartTooltip">
          <span id="tooltipPrice"></span>
          <span id="tooltipDate"></span>
        </div>
      </div>
    </div>

    <!-- Holdings -->
    <div class="holdings-section">
      <div class="section-label">My Holdings</div>
      <div class="holdings-row">
        <div class="holdings-input-group">
          <input type="number" id="holdingsAmt" class="holdings-input" placeholder="0.00" step="any" min="0">
          <span class="holdings-unit" id="holdingsUnit">BTC</span>
        </div>
        <div class="holdings-fiat" id="holdingsFiat">= $0.00</div>
      </div>
    </div>

    <!-- Portfolio global -->
    <div class="portfolio-section" id="portfolioSection">
      <div class="portfolio-header">
        <div class="section-label">Global Portfolio</div>
        <div class="portfolio-total" id="portfolioTotal">$0</div>
      </div>
      <div class="portfolio-breakdown" id="portfolioBreakdown"></div>
    </div>

    <!-- Watchlist -->
    <div class="watchlist-section">
      <div class="section-header">
        <div class="section-label">Watchlist</div>
        <button class="add-btn" id="addBtn" title="Add a crypto">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>

      <div class="search-box" id="searchBox">
        <input type="text" id="searchInput" class="search-input" placeholder="Search Bitcoin, Ethereum…" autocomplete="off">
        <div class="search-results" id="searchResults"></div>
      </div>

      <div class="watchlist" id="watchlist"></div>
    </div>

    <!-- Price Alerts -->
    <div class="alerts-section">
      <div class="section-header">
        <div class="section-label">Price Alerts</div>
        <button class="add-btn" id="addAlertBtn" title="Add alert">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <div class="alert-form" id="alertForm">
        <div class="alert-form-row">
          <select id="alertCoin" class="alert-select"></select>
          <div class="alert-cond-toggle">
            <button class="alert-cond-btn active" data-cond="above">≥</button>
            <button class="alert-cond-btn" data-cond="below">≤</button>
          </div>
          <input type="number" id="alertPrice" class="alert-price-input" placeholder="Price" step="any" min="0">
          <button class="alert-submit-btn" id="alertSubmit" title="Confirm">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="alerts-list" id="alertsList"></div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
